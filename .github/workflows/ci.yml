name: Validate application

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Set up Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate generated data
        run: bun run validate:data

      - name: Run unit tests
        run: bun test

      - name: Build
        run: bun run build
